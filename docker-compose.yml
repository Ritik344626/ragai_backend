x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile
  image: rag-trends-backend:latest
  env_file:
    - .env
  restart: unless-stopped

services:
  api:
    <<: *backend-common
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    <<: *backend-common
    command: celery -A app.celery_app.celery_app worker --loglevel=info --pool=solo --concurrency=1

  beat:
    <<: *backend-common
    command: celery -A app.celery_app.celery_app beat --loglevel=info